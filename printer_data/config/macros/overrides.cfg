## Override TURN_OFF_HEATERS to also shut off bed fans
[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
gcode:
    _BEDFANSOFF
    _TURN_OFF_HEATERS

## Override QUAD_GANTRY_LEVEL to do a coarse pass first if unapplied,
## then a fine pass. Also clears bed mesh before leveling.
[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
    SAVE_GCODE_STATE NAME=STATE_QGL
    BED_MESH_CLEAR
    {% if not printer.quad_gantry_level.applied %}
       _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z=20 RETRY_TOLERANCE=0.500 PROBE_SPEED=15 LIFT_SPEED=10
    {% endif %}
    _QUAD_GANTRY_LEVEL horizontal_move_z=2

## Conditional QGL – only levels if not already applied
[gcode_macro CQUAD_GANTRY_LEVEL]
gcode:
    {% if printer.quad_gantry_level.applied == False %}
        {% if "xyz" not in printer.toolhead.homed_axes %}
            G28 ; home if not already homed
        {% endif %}
        QUAD_GANTRY_LEVEL
        G28 Z
    {% endif %}
