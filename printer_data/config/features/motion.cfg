#####################################################################
#   Kinematics
#####################################################################

[printer]
kinematics: limited_corexy
max_velocity: 1000
max_accel: 7000			        #Max 4000
max_z_velocity: 15			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 8
max_x_accel: 6800
max_y_accel: 6100
minimum_cruise_ratio: 0.1

#####################################################################
#   X/Y Stepper Settings
#####################################################################

[stepper_y]
##	Connected to X-MOT (B Motor)
step_pin: PE11
dir_pin: PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
##	350mm build
position_endstop: 358
position_max: 358
homing_speed: 40   #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
sense_resistor: 0.110
uart_pin: PE7
diag_pin: ^PB14
interpolate: True
run_current: 1.0
hold_current: 0.7

[autotune_tmc stepper_y]
motor: fysetc-17HS19-2004S-AB
sg4_thrs: 100

[stepper_x]
##	Connected to Y-MOT (A Motor)
step_pin: PD8
dir_pin: PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
##	350mm build
position_endstop: 350
position_max: 350
homing_speed: 40  #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
sense_resistor: 0.110
uart_pin: PE15
diag_pin: ^PB13
interpolate: True
run_current: 1.0
hold_current: 0.7

[autotune_tmc stepper_x]
motor: fysetc-17HS19-2004S-AB
sg4_thrs: 110

#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
[stepper_z]
step_pin: PD14
dir_pin: PD13
enable_pin: !PD15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
homing_speed: 3
second_homing_speed: 3
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
##	350mm build
position_max: 340
position_min: -5

[tmc2209 stepper_z]
sense_resistor: 0.110
uart_pin: PD10
uart_address: 0
interpolate: True
run_current: 1.0
hold_current: 0.8

[autotune_tmc stepper_z]
motor: fysetc-17HS19-2004S-C

## Z1 Stepper - Rear Left
[stepper_z1]
step_pin: PE6
dir_pin: !PC13
enable_pin: !PE5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z1]
sense_resistor: 0.110
uart_pin: PC14
interpolate: True
run_current: 0.8
hold_current: 0.8

[autotune_tmc stepper_z1]
motor: fysetc-17HS19-2004S-C

## Z2 Stepper - Rear Right
[stepper_z2]
step_pin: PE2
dir_pin: PE4
enable_pin: !PE3
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z2]
sense_resistor: 0.110
uart_pin: PC15
interpolate: true
run_current: 0.8
hold_current: 0.8

[autotune_tmc stepper_z2]
motor: fysetc-17HS19-2004S-C

## Z3 Stepper - Front Right
[stepper_z3]
step_pin: PD12
dir_pin: !PC4
enable_pin: !PE8
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z3]
sense_resistor: 0.110
uart_pin: PA15
interpolate: true
run_current: 0.8
hold_current: 0.8

[autotune_tmc stepper_z3]
motor: fysetc-17HS19-2004S-C

#####################################################################
#   Input Shaper / Resonance Testing
#####################################################################

[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 20
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0

[input_shaper]
smoother_freq_x: 53
shaper_type_x: smooth_2hump_ei
smoother_freq_y: 35.2
shaper_type_y: smooth_zv
enabled_extruders: extruder
