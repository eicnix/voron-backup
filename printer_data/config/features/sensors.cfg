#####################################################################
#   Filament Sensors
#####################################################################

[filament_switch_sensor btt_switch]
switch_pin: ^PA3
pause_on_runout: False
smart: True
check_on_print_start: True
runout_distance: 1100 #TODO finetune for actual length
runout_gcode:
  PAUSE
  RESPOND TYPE=command MSG='Filament switch runout'
insert_gcode:
  RESPOND TYPE=command MSG='Filament switch inserted'

[filament_motion_sensor btt_encoder]
switch_pin: ^PA2
detection_length: 3.5
extruder: extruder
pause_on_runout: False
smart: True
runout_gcode:
  PAUSE
  RESPOND TYPE=command MSG='Filament encoder runout'
insert_gcode:
  RESPOND TYPE=command MSG='Filament encoder inserted'

