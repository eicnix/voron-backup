#####################################################################
#   Fan Control
#####################################################################

[fan]
##  Print Cooling Fan - FAN0
pin: EBBCan:PA0
max_power: 1.0
kick_start_time: 0.5

[heater_fan hotend_fan]
heater: extruder
heater_temp: 50.0
pin: EBBCan: PA1
tachometer_pin: ^EBBCan: PB6
max_power: 1.0
kick_start_time: 0.5
tachometer_ppr: 2
tachometer_poll_interval: 0.0009

[heater_fan controller_fan]
##	Controller fan - FAN2 Connector
pin: PB2
max_power: 1.0
kick_start_time: 0.5
heater: heater_bed
heater_temp: 45.0
fan_speed: 0.5
