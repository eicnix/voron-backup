#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
##	rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
rotation_distance: 22.59284
##	Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##	Use 80:20 for M4, M3.1
gear_ratio: 50:10	#BMG Gear Ratio
microsteps: 16
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: EBBCan: PB13
sensor_type: PT1000
sensor_pin: EBBCan: PA3
min_temp: -100
max_temp: 300
max_power: 1.0
min_extrude_temp: 160
#pressure_advance_model: tanh
#linearization_velocity: 1
#linear_advance: 0.039
#nonlinear_offset: 0.115
#pressure_advance_time_offset: 0.0012
linear_advance: 0
nonlinear_offset: 0
pressure_advance_time_offset: 0
pressure_advance_smooth_time: 0.020
max_extrude_cross_section: 5
max_extrude_only_distance: 200

[tmc2209 extruder]
uart_pin: EBBCan:PA15
interpolate: true
run_current: 0.5
sense_resistor: 0.110

[autotune_tmc extruder]
motor: fysetc-g36hsy4405-6d-30
tuning_goal: performance
